  <script src="../main.js"></script>
  <script>
    const captions = {
      selfie: ['Feeling myself 💅', 'Just me time ✨', 'Confidence is key 🔑', 'Love myself first 💕', 'Glow up mode ⚡'],
      travel: ['Adventure awaits 🌍', 'Passport full 🧳', 'Chasing sunsets 🌅', 'Lost but found 🗺️', 'Wanderlust mode ✈️'],
      food: ['Food is my love 🍕', 'Eating good ✨', 'Taste of happiness 🍴', 'Foodies unite 👀', 'Good food vibes 🤤'],
      friends: ['Squad goals 👯', 'These are my favorites 💕', 'Life with friends 🥰', 'Always together 👫', 'Besties for life 💫'],
      motivation: ['Keep growing 📈', 'Hustle hard 💪', 'You got this 🔥', 'Level up 🚀', 'Blessed & grateful 🙏']
    };

    let currentCat = 'all';

    function setCategory(cat) {
      currentCat = cat;
    }

    function renderCaptions() {
      const list = document.getElementById('captionsList');
      list.innerHTML = '';

      let caps = currentCat === 'all' ? Object.values(captions).flat() : captions[currentCat] || [];

      caps.forEach((cap, idx) => {
        const div = document.createElement('div');
        div.className = 'content-item';
        div.innerHTML = `
          <div class="content-text">${cap}</div>
          <button class="btn btn-sm btn-neon" onclick="copyText('${cap.replace(/'/g, "\\'")}')">Copy</button>
        `;
        list.appendChild(div);
      });
    }

    renderCaptions();
  </script>
