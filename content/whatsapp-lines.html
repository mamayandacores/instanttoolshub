  <script>
    const lines = {
      funny: ['I need a 6 month vacation twice a year 😂', 'Not lazy, on energy saving mode 😴', 'My phone is my life, literally 📱', 'Coffee first, questions later ☕'],
      attitude: ['I\'m not perfect but I\'m limited edition 💎', 'Real queens fix each other\'s crowns 👑', 'Too glam to give a damn ✨', 'Zero drama policy 🚫'],
      love: ['Spreading love & light ❤️', 'Love is all you need 💕', 'Forever grateful 🙏', 'Sending good vibes only ✨'],
      motivation: ['Hustle hard dream bigger 💪', 'You got this 🔥', 'Level up every day 📈', 'Blessed & grateful 🙏']
    };

    let currentType = 'all';

    function setType(type) {
      currentType = type;
    }

    function renderLines() {
      const list = document.getElementById('linesList');
      list.innerHTML = '';

      let items = currentType === 'all' ? Object.values(lines).flat() : lines[currentType] || [];

      items.forEach(line => {
        const div = document.createElement('div');
        div.className = 'content-item';
        div.innerHTML = `
          <div class="content-text">${line}</div>
          <button class="btn btn-sm btn-neon" onclick="copyText('${line.replace(/'/g, "\\'")}')">Copy</button>
        `;
        list.appendChild(div);
      });
    }

    renderLines();
  </script>
